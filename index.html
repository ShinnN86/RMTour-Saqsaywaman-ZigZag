<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Templo 3D Interactivo</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>

    body {

      margin: 0;

      overflow: hidden;

    }


    /* =========================
       CONTROLES DE MOVIMIENTO
    ========================= */

    #mobileControls {

      position: absolute;

      left: 290px;

      bottom: 25px;

      z-index: 1000;

      user-select: none;

    }


    #mobileControls .fila {

      display: flex;

      gap: 10px;

      margin-top: 10px;

      justify-content: center;

    }


    #mobileControls button {

      width: 65px;

      height: 65px;

      border: none;

      border-radius: 50%;

      background: rgba(30, 30, 30, .65);

      color: white;

      font-size: 28px;

      backdrop-filter: blur(8px);

      touch-action: none;

    }


    #mobileControls button:active {

      background: #d6b15f;

    }


    /* =========================
       CONTROLES DE ALTURA
    ========================= */

    #mobileHeight {

      position: absolute;

      bottom: 40px;

      right: 30px;

      display: flex;

      flex-direction: column;

      gap: 15px;

      z-index: 1000;

    }


    #mobileHeight button {

      width: 65px;

      height: 65px;

      border: none;

      border-radius: 50%;

      background: rgba(30, 30, 30, .65);

      color: white;

      font-size: 30px;

      font-weight: bold;

      backdrop-filter: blur(8px);

      touch-action: none;

    }


    #mobileHeight button:active {

      background: #d6b15f;

    }


    /* =========================
       CAJA DE INFORMACIÓN
    ========================= */

    #infoBox {

      position: absolute;

      top: 30px;

      right: 30px;

      width: 320px;

      padding: 20px;

      color: white;

      background: rgba(18, 22, 30, .78);

      backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 215, 120, .5);

      border-left: 6px solid #d6b15f;

      border-radius: 18px;

      box-shadow: 0 15px 40px rgba(0, 0, 0, .35);

      font-family: Arial, sans-serif;

      display: none;

      animation: fade .35s ease;

      z-index: 999;

    }


    #titulo {

      margin: 0;

      font-size: 23px;

      color: #ffd56a;

    }


    #descripcion {

      margin-top: 10px;

      line-height: 1.6;

      font-size: 15px;

      color: #eee;

    }


    @keyframes fade {

      from {

        opacity: 0;

        transform: translateX(30px);

      }


      to {

        opacity: 1;

        transform: translateX(0);

      }

    }


    /* =========================
       LÍNEA DE CONEXIÓN
    ========================= */

    #lineCanvas {

      position: absolute;

      left: 0;

      top: 0;

      width: 100%;

      height: 100%;

      pointer-events: none;

      z-index: 500;

    }

  </style>

</head>


<body>


  <!-- =========================
       CONTROLES DE MOVIMIENTO
  ========================= -->

  <div id="mobileControls">

    <button id="btnW">

      ▲

    </button>


    <div class="fila">

      <button id="btnA">

        ◀

      </button>


      <button id="btnS">

        ▼

      </button>


      <button id="btnD">

        ▶

      </button>

    </div>

  </div>


  <!-- =========================
       CONTROLES VERTICALES
  ========================= -->

  <div id="mobileHeight">

    <button id="btnUp">

      +

    </button>


    <button id="btnDown">

      −

    </button>

  </div>


  <!-- =========================
       INFORMACIÓN
  ========================= -->

  <div id="infoBox">

    <h3 id="titulo"></h3>

    <p id="descripcion"></p>

  </div>


  <!-- =========================
       CANVAS DE CONEXIÓN
  ========================= -->

  <canvas id="lineCanvas"></canvas>


  <!-- =========================
       ESCENA A-FRAME
  ========================= -->

  <a-scene

    id="scene"

    shadow="type:pcfsoft; enabled:true"

    webxr="optionalFeatures: hit-test, local-floor"

    renderer="alpha: true; antialias: true; colorManagement: true"

    vr-mode-ui="enabled: true">


    <!-- =========================
         ASSETS
    ========================= -->

    <a-assets>

      <a-asset-item

        id="modeloGLB"

        src="Saqsaywamanv5.glb">

      </a-asset-item>

    </a-assets>


    <!-- =========================
         CIELO
    ========================= -->

    <a-sky

      id="sky"

      color="#87CEEB">

    </a-sky>


    <!-- =========================
         LUZ AMBIENTAL
    ========================= -->

    <a-light

      type="ambient"

      color="#dfe8ff"

      intensity="0.65">

    </a-light>


    <!-- =========================
         SOL PRINCIPAL
    ========================= -->

    <a-light

      type="directional"

      color="#fff5d6"

      intensity="2.8"

      position="6 10 4"

      cast-shadow="true">

    </a-light>


    <!-- =========================
         LUZ DE RELLENO
    ========================= -->

    <a-light

      type="directional"

      color="#cfe7ff"

      intensity="1.2"

      position="-6 4 -4">

    </a-light>


    <!-- =========================
         CONTRALUZ
    ========================= -->

    <a-light

      type="directional"

      color="#ffe9c0"

      intensity="0.8"

      position="0 6 -8">

    </a-light>


    <!-- =========================
         MODELO 3D
    ========================= -->

    <a-entity

      id="templo"

      gltf-model="#modeloGLB"

      position="0 0 2"

      scale=".2 .2 .2"

      shadow="cast: true; receive: true">

    </a-entity>


    <!-- =========================
         CÁMARA
    ========================= -->

    <a-entity

      id="camera"

      camera

      look-controls

      wasd-controls="acceleration:80"

      position="0 1.6 5">


      <a-cursor

        rayOrigin="entity">

      </a-cursor>


    </a-entity>


  </a-scene>


  <script>


    /* =====================================================
       MOVIMIENTO
    ===================================================== */


    let mover = {

      w: false,

      a: false,

      s: false,

      d: false,

      up: false,

      down: false

    };


    const camara =

      document.querySelector(

        "#camera"

      );


    /* =====================================================
       MOVIMIENTO Q / E
    ===================================================== */


    window.addEventListener(

      "keydown",

      (e) => {


        const pos =

          camara.getAttribute(

            "position"

          );


        const paso = 0.25;


        switch (

          e.key.toLowerCase()

        ) {


          case "q":

            pos.y += paso;

            break;


          case "e":

            pos.y -= paso;

            break;


          default:

            return;

        }


        camara.setAttribute(

          "position",

          pos

        );


      }

    );


    /* =====================================================
       BOTONES DE MOVIMIENTO
    ===================================================== */


    const botones = [


      ["btnW", "w"],


      ["btnA", "a"],


      ["btnS", "s"],


      ["btnD", "d"],


      ["btnUp", "up"],


      ["btnDown", "down"]


    ];


    botones.forEach(

      ([id, key]) => {


        const boton =

          document.getElementById(

            id

          );


        /* TOUCH */


        boton.addEventListener(

          "touchstart",

          (e) => {


            e.preventDefault();


            mover[key] = true;


          }

        );


        boton.addEventListener(

          "touchend",

          (e) => {


            e.preventDefault();


            mover[key] = false;


          }

        );


        /* POINTER */


        boton.addEventListener(

          "pointerdown",

          () => {


            mover[key] = true;


          }

        );


        boton.addEventListener(

          "pointerup",

          () => {


            mover[key] = false;


          }

        );


        boton.addEventListener(

          "pointerleave",

          () => {


            mover[key] = false;


          }

        );


        boton.addEventListener(

          "pointercancel",

          () => {


            mover[key] = false;


          }

        );


      }

    );


    /* =====================================================
       INFORMACIÓN DE OBJETOS
    ===================================================== */


    const infoPartes = {


      "Muro2": {


        titulo:

          "Entrada Principal",


        descripcion:

          "Lugar ceremonial del templo."


      },


      "Rampa": {


        titulo:

          "Rampa Visible",


        descripcion:

          "Rampa del monumento."


      },


      "Cubo1526": {


        titulo:

          "Columna",


        descripcion:

          "Soporte estructural de piedra."


      },


      "Rampa2": {


        titulo:

          "Rampa",


        descripcion:

          "Segunda rampa del monumento."


      }


    };


    /* =====================================================
       ELEMENTOS DE INTERFAZ
    ===================================================== */


    const templo =

      document.querySelector(

        "#templo"

      );


    const infoBox =

      document.querySelector(

        "#infoBox"

      );


    const titulo =

      document.querySelector(

        "#titulo"

      );


    const descripcion =

      document.querySelector(

        "#descripcion"

      );


    const canvas =

      document.getElementById(

        "lineCanvas"

      );


    const ctx =

      canvas.getContext(

        "2d"

      );


    /* =====================================================
       RAYCASTER
    ===================================================== */


    let mouse =

      new THREE.Vector2();


    let raycaster =

      new THREE.Raycaster();


    let lastHit =

      null;


    let meshList = [];


    /* =====================================================
       MODELO CARGADO
    ===================================================== */


    templo.addEventListener(

      "model-loaded",

      () => {


        const mesh =

          templo.getObject3D(

            "mesh"

          );


        meshList = [];


        mesh.traverse(

          (obj) => {


            if (

              !obj.isMesh

            )

              return;


            obj.userData.clickable =

              true;


            meshList.push(

              obj

            );


          }

        );


        console.log(

          "Objetos interactivos:",

          meshList

        );


      }

    );


    /* =====================================================
       DETECCIÓN CON MOUSE
    ===================================================== */


    window.addEventListener(

      "mousemove",

      (event) => {


        if (

          meshList.length === 0

        )

          return;


        const camera =

          document

            .querySelector(

              "[camera]"

            )

            .getObject3D(

              "camera"

            );


        mouse.x =

          (

            event.clientX /

            window.innerWidth

          ) * 2 - 1;


        mouse.y =

          - (

            event.clientY /

            window.innerHeight

          ) * 2 + 1;


        raycaster.setFromCamera(

          mouse,

          camera

        );


        const intersects =

          raycaster.intersectObjects(

            meshList,

            true

          );


        if (

          intersects.length === 0

        ) {


          lastHit =

            null;


          infoBox.style.display =

            "none";


          ctx.clearRect(

            0,

            0,

            canvas.width,

            canvas.height

          );


          return;


        }


        const obj =

          intersects[0].object;


        const data =

          infoPartes[

            obj.name

          ];


        if (!data)

          return;


        lastHit =

          obj.name;


        titulo.textContent =

          data.titulo;


        descripcion.textContent =

          data.descripcion;


        infoBox.style.display =

          "block";


        drawConnection(

          obj

        );


      }

    );


    /* =====================================================
       DETECCIÓN EN EL CENTRO
    ===================================================== */


    function detectarCentro() {


      if (


        !("ontouchstart" in window) &&


        navigator.maxTouchPoints <= 0


      )

        return;


      const camera =

        document

          .querySelector(

            "[camera]"

          )

          .getObject3D(

            "camera"

          );


      raycaster.setFromCamera(

        new THREE.Vector2(

          0,

          0

        ),

        camera

      );


      const intersects =

        raycaster.intersectObjects(

          meshList,

          true

        );


      if (

        intersects.length > 0

      ) {


        const obj =

          intersects[0].object;


        const data =

          infoPartes[

            obj.name

          ];


        if (data) {


          if (

            lastHit !==

            obj.name

          ) {


            lastHit =

              obj.name;


            titulo.textContent =

              data.titulo;


            descripcion.textContent =

              data.descripcion;


            infoBox.style.display =

              "block";


          }


          drawConnection(

            obj

          );


          return;


        }


      }


      lastHit =

        null;


      infoBox.style.display =

        "none";


      ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

      );


    }


    /* =====================================================
       CANVAS
    ===================================================== */


    function resizeCanvas() {


      canvas.width =

        window.innerWidth;


      canvas.height =

        window.innerHeight;


    }


    resizeCanvas();


    window.addEventListener(

      "resize",

      resizeCanvas

    );


    /* =====================================================
       LÍNEA DE CONEXIÓN
    ===================================================== */


    function drawConnection(

      obj

    ) {


      ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

      );


      const camera =

        document

          .querySelector(

            "[camera]"

          )

          .getObject3D(

            "camera"

          );


      const pos =

        obj.getWorldPosition(

          new THREE.Vector3()

        );


      pos.project(

        camera

      );


      const x =

        (

          pos.x *

          0.5 +

          0.5

        ) *

        canvas.width;


      const y =

        (

          - (

            pos.y *

            0.5 +

            0.5

          )

        ) *

        canvas.height;


      const box =

        infoBox.getBoundingClientRect();


      const x2 =

        box.left;


      const y2 =

        box.top +

        box.height /

        2;


      ctx.strokeStyle =

        "#ffd56a";


      ctx.lineWidth =

        3;


      ctx.beginPath();


      ctx.moveTo(

        x,

        y

      );


      ctx.lineTo(

        x2,

        y2

      );


      ctx.stroke();


      ctx.fillStyle =

        "#ffd56a";


      ctx.beginPath();


      ctx.arc(

        x,

        y,

        7,

        0,

        Math.PI * 2

      );


      ctx.fill();


    }


    /* =====================================================
       ANIMACIÓN Y MOVIMIENTO
    ===================================================== */


    function animate() {


      requestAnimationFrame(

        animate

      );


      const velocidad =

        0.12;


      const velocidadY =

        0.08;


      if (

        mover.w

      )

        camara.object3D.translateZ(

          -velocidad

        );


      if (

        mover.s

      )

        camara.object3D.translateZ(

          velocidad

        );


      if (

        mover.a

      )

        camara.object3D.translateX(

          -velocidad

        );


      if (

        mover.d

      )

        camara.object3D.translateX(

          velocidad

        );


      if (

        mover.up

      )

        camara.object3D.position.y +=

          velocidadY;


      if (

        mover.down

      )

        camara.object3D.position.y -=

          velocidadY;


      detectarCentro();


    }


    animate();


    /* =====================================================
       INTEGRACIÓN AR
    ===================================================== */


    const scene =

      document.querySelector(

        "#scene"

      );


    const sky =

      document.querySelector(

        "#sky"

      );


    scene.addEventListener(

      "enter-vr",

      () => {


        if (

          scene.is(

            "ar-mode"

          )

        ) {


          console.log(

            "Modo AR iniciado"

          );


          /* OCULTAR CIELO */


          sky.setAttribute(

            "visible",

            false

          );


          /* POSICIONAR MODELO */


          templo.setAttribute(

            "position",

            "0 0 -11"

          );


          templo.setAttribute(

            "scale",

            "0.3 0.3 0.3"

          );


        }


      }

    );


    /* =====================================================
       SALIR DE AR
    ===================================================== */


    scene.addEventListener(

      "exit-vr",

      () => {


        console.log(

          "Saliendo AR"

        );


        sky.setAttribute(

          "visible",

          true

        );


        templo.setAttribute(

          "position",

          "0 0.8 0"

        );


        templo.setAttribute(

          "scale",

          "0.3 0.3 0.3"

        );


      }

    );


  </script>


</body>

</html>
