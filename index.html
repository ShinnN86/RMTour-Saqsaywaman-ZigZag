<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="utf-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Templo 3D Interactivo</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
    }

    /* CONTROLES DE MOVIMIENTO */

    #mobileControls {

      position: absolute;

      left: 290px;

      bottom: 25px;

      z-index: 1000;

      user-select: none;

    }

    #mobileControls .fila {

      display: flex;

      gap: 10px;

      margin-top: 10px;

      justify-content: center;

    }

    #mobileControls button {

      width: 65px;

      height: 65px;

      border: none;

      border-radius: 50%;

      background: rgba(30, 30, 30, .65);

      color: white;

      font-size: 28px;

      backdrop-filter: blur(8px);

      touch-action: none;

      z-index: 1000;

    }

    #mobileControls button:active {

      background: #d6b15f;

    }


    /* CONTROLES DE ALTURA */

    #mobileHeight {

      position: absolute;

      bottom: 40px;

      right: 30px;

      display: flex;

      flex-direction: column;

      gap: 15px;

      z-index: 1000;

    }

    #mobileHeight button {

      width: 65px;

      height: 65px;

      border: none;

      border-radius: 50%;

      background: rgba(30, 30, 30, .65);

      color: white;

      font-size: 30px;

      font-weight: bold;

      backdrop-filter: blur(8px);

      touch-action: none;

    }

    #mobileHeight button:active {

      background: #d6b15f;

    }


    /* CAJA DE INFORMACIÓN */

    #infoBox {

      position: absolute;

      top: 30px;

      right: 30px;

      width: 320px;

      padding: 20px;

      color: white;

      background: rgba(18, 22, 30, .78);

      backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 215, 120, .5);

      border-left: 6px solid #d6b15f;

      border-radius: 18px;

      box-shadow: 0 15px 40px rgba(0, 0, 0, .35);

      font-family: Arial, sans-serif;

      display: none;

      animation: fade .35s ease;

      z-index: 999;

    }

    #titulo {

      margin: 0;

      font-size: 23px;

      color: #ffd56a;

    }

    #descripcion {

      margin-top: 10px;

      line-height: 1.6;

      font-size: 15px;

      color: #eee;

    }

    @keyframes fade {

      from {

        opacity: 0;

        transform: translateX(30px);

      }

      to {

        opacity: 1;

        transform: translateX(0);

      }

    }


    /* LÍNEA DE CONEXIÓN */

    #lineCanvas {

      position: absolute;

      left: 0;

      top: 0;

      width: 100%;

      height: 100%;

      pointer-events: none;

      z-index: 500;

    }


    /* BOTÓN AR */

    #arButton {

      position: absolute;

      top: 25px;

      left: 25px;

      z-index: 2000;

      padding: 14px 20px;

      border: none;

      border-radius: 12px;

      background: rgba(30, 30, 30, .75);

      color: white;

      font-size: 16px;

      cursor: pointer;

      backdrop-filter: blur(8px);

    }

    #arButton:active {

      background: #d6b15f;

    }


    /* BOTÓN SALIR AR */

    #exitAR {

      position: absolute;

      top: 25px;

      left: 25px;

      z-index: 2000;

      padding: 14px 20px;

      border: none;

      border-radius: 12px;

      background: rgba(160, 30, 30, .8);

      color: white;

      font-size: 16px;

      display: none;

    }

  </style>


  <!-- A-FRAME -->

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>


<body>


  <!-- BOTONES AR -->

  <button id="arButton">

    🥽 Activar AR

  </button>


  <button id="exitAR">

    ❌ Salir de AR

  </button>


  <!-- CONTROLES DE MOVIMIENTO -->

  <div id="mobileControls">

    <button id="btnW">

      ▲

    </button>


    <div class="fila">

      <button id="btnA">

        ◀

      </button>


      <button id="btnS">

        ▼

      </button>


      <button id="btnD">

        ▶

      </button>

    </div>

  </div>


  <!-- CONTROLES VERTICALES -->

  <div id="mobileHeight">

    <button id="btnUp">

      +

    </button>


    <button id="btnDown">

      −

    </button>

  </div>


  <!-- INFORMACIÓN -->

  <div id="infoBox">

    <h3 id="titulo"></h3>

    <p id="descripcion"></p>

  </div>


  <!-- CANVAS PARA LÍNEA -->

  <canvas id="lineCanvas"></canvas>


  <!-- ESCENA -->

  <a-scene

    id="scene"

    shadow="type:pcfsoft; enabled:true"

    renderer="colorManagement:true; physicallyCorrectLights:true; alpha:true"

    webxr="optionalFeatures: hit-test;"

  >


    <!-- ASSETS -->

    <a-assets>

      <a-asset-item

        id="modeloGLB"

        src="Saqsaywamanv5.glb">

      </a-asset-item>

    </a-assets>


    <!-- CIELO -->

    <a-sky

      id="sky"

      color="#87CEEB">

    </a-sky>


    <!-- LUZ AMBIENTAL -->

    <a-light

      type="ambient"

      color="#dfe8ff"

      intensity="0.65">

    </a-light>


    <!-- SOL -->

    <a-light

      type="directional"

      color="#fff5d6"

      intensity="2.8"

      position="6 10 4"

      castShadow="true">

    </a-light>


    <!-- LUZ DE RELLENO -->

    <a-light

      type="directional"

      color="#cfe7ff"

      intensity="1.2"

      position="-6 4 -4">

    </a-light>


    <!-- CONTRALUZ -->

    <a-light

      type="directional"

      color="#ffe9c0"

      intensity="0.8"

      position="0 6 -8">

    </a-light>


    <!-- MODELO -->

    <a-entity

      id="templo"

      gltf-model="#modeloGLB"

      position="0 0 2"

      scale=".2 .2 .2">

    </a-entity>


    <!-- CÁMARA -->

    <a-entity

      id="camera"

      camera

      look-controls

      wasd-controls="acceleration:80"

      position="0 1.6 5">


      <a-cursor

        rayOrigin="entity">

      </a-cursor>


    </a-entity>


  </a-scene>


  <script>


    /* ============================
       VARIABLES DE MOVIMIENTO
    ============================ */

    let mover = {

      w: false,

      a: false,

      s: false,

      d: false,

      up: false,

      down: false

    };


    const camara = document.querySelector("#camera");


    /* ============================
       MOVIMIENTO Q / E
    ============================ */

    window.addEventListener("keydown", (e) => {


      const pos = camara.getAttribute("position");


      const paso = 0.25;


      switch (e.key.toLowerCase()) {


        case "q":

          pos.y += paso;

          break;


        case "e":

          pos.y -= paso;

          break;


        default:

          return;

      }


      camara.setAttribute("position", pos);


    });


    /* ============================
       BOTONES DE MOVIMIENTO
    ============================ */

    const botones = [

      ["btnW", "w"],

      ["btnA", "a"],

      ["btnS", "s"],

      ["btnD", "d"],

      ["btnUp", "up"],

      ["btnDown", "down"]

    ];


    botones.forEach(([id, key]) => {


      const boton = document.getElementById(id);


      /* TOUCH */

      boton.addEventListener("touchstart", (e) => {

        e.preventDefault();

        mover[key] = true;

      });


      boton.addEventListener("touchend", (e) => {

        e.preventDefault();

        mover[key] = false;

      });


      /* POINTER */

      boton.addEventListener("pointerdown", () => {

        mover[key] = true;

      });


      boton.addEventListener("pointerup", () => {

        mover[key] = false;

      });


      boton.addEventListener("pointerleave", () => {

        mover[key] = false;

      });


      boton.addEventListener("pointercancel", () => {

        mover[key] = false;

      });


    });


    /* ============================
       OBJETO DEL TEMPLO
    ============================ */

    const templo = document.querySelector("#templo");


    const infoBox = document.querySelector("#infoBox");

    const titulo = document.querySelector("#titulo");

    const descripcion = document.querySelector("#descripcion");


    /* ============================
       INFORMACIÓN DE OBJETOS
    ============================ */

    const infoPartes = {


      "Muro2": {

        titulo: "Entrada Principal",

        descripcion: "Lugar ceremonial del templo."

      },


      "Rampa": {

        titulo: "Rampa Visible",

        descripcion: "Rampa del monumento."

      },


      "Cubo1526": {

        titulo: "Columna",

        descripcion: "Soporte estructural de piedra."

      },


      "Rampa2": {

        titulo: "Rampa",

        descripcion: "Segunda rampa del monumento."

      }

    };


    /* ============================
       RAYCASTER
    ============================ */

    let mouse = new THREE.Vector2();


    let raycaster = new THREE.Raycaster();


    let lastHit = null;


    let meshList = [];


    /* ============================
       MODELO CARGADO
    ============================ */

    templo.addEventListener("model-loaded", () => {


      const mesh = templo.getObject3D("mesh");


      meshList = [];


      mesh.traverse((obj) => {


        if (!obj.isMesh)

          return;


        obj.userData.clickable = true;


        meshList.push(obj);


      });


      console.log(

        "Objetos interactivos:",

        meshList

      );


    });


    /* ============================
       MOUSE
    ============================ */

    window.addEventListener("mousemove", (event) => {


      if (meshList.length === 0)

        return;


      const camera = document

        .querySelector("[camera]")

        .getObject3D("camera");


      mouse.x =

        (event.clientX / window.innerWidth) * 2 - 1;


      mouse.y =

        -(event.clientY / window.innerHeight) * 2 + 1;


      raycaster.setFromCamera(

        mouse,

        camera

      );


      const intersects =

        raycaster.intersectObjects(

          meshList,

          true

        );


      if (intersects.length === 0) {


        lastHit = null;


        infoBox.style.display = "none";


        ctx.clearRect(

          0,

          0,

          canvas.width,

          canvas.height

        );


        return;

      }


      const obj = intersects[0].object;


      const data = infoPartes[obj.name];


      if (!data)

        return;


      lastHit = obj.name;


      titulo.textContent = data.titulo;


      descripcion.textContent = data.descripcion;


      infoBox.style.display = "block";


      drawConnection(obj);


    });


    /* ============================
       DETECTAR CENTRO
    ============================ */

    function detectarCentro() {


      if (

        !("ontouchstart" in window) &&

        navigator.maxTouchPoints <= 0

      )

        return;


      const camera = document

        .querySelector("[camera]")

        .getObject3D("camera");


      raycaster.setFromCamera(

        new THREE.Vector2(0, 0),

        camera

      );


      const intersects =

        raycaster.intersectObjects(

          meshList,

          true

        );


      if (intersects.length > 0) {


        const obj = intersects[0].object;


        const data = infoPartes[obj.name];


        if (data) {


          if (lastHit !== obj.name) {


            lastHit = obj.name;


            titulo.textContent = data.titulo;


            descripcion.textContent = data.descripcion;


            infoBox.style.display = "block";


          }


          drawConnection(obj);


          return;


        }

      }


      lastHit = null;


      infoBox.style.display = "none";


      ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

      );


    }


    /* ============================
       CANVAS
    ============================ */

    const canvas =

      document.getElementById(

        "lineCanvas"

      );


    const ctx =

      canvas.getContext("2d");


    function resizeCanvas() {


      canvas.width =

        window.innerWidth;


      canvas.height =

        window.innerHeight;


    }


    resizeCanvas();


    window.addEventListener(

      "resize",

      resizeCanvas

    );


    /* ============================
       DIBUJAR CONEXIÓN
    ============================ */

    function drawConnection(obj) {


      ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

      );


      const camera = document

        .querySelector("[camera]")

        .getObject3D("camera");


      const pos = obj.getWorldPosition(

        new THREE.Vector3()

      );


      pos.project(camera);


      const x =

        (pos.x * 0.5 + 0.5) *

        canvas.width;


      const y =

        (-pos.y * 0.5 + 0.5) *

        canvas.height;


      const box =

        infoBox.getBoundingClientRect();


      const x2 = box.left;


      const y2 =

        box.top +

        box.height / 2;


      ctx.strokeStyle = "#ffd56a";


      ctx.lineWidth = 3;


      ctx.beginPath();


      ctx.moveTo(x, y);


      ctx.lineTo(x2, y2);


      ctx.stroke();


      ctx.fillStyle = "#ffd56a";


      ctx.beginPath();


      ctx.arc(

        x,

        y,

        7,

        0,

        Math.PI * 2

      );


      ctx.fill();


    }


    /* ============================
       MOVIMIENTO
    ============================ */

    function animate() {


      requestAnimationFrame(

        animate

      );


      const velocidad = 0.12;


      const velocidadY = 0.08;


      if (mover.w)

        camara.object3D.translateZ(

          -velocidad

        );


      if (mover.s)

        camara.object3D.translateZ(

          velocidad

        );


      if (mover.a)

        camara.object3D.translateX(

          -velocidad

        );


      if (mover.d)

        camara.object3D.translateX(

          velocidad

        );


      if (mover.up)

        camara.object3D.position.y +=

          velocidadY;


      if (mover.down)

        camara.object3D.position.y -=

          velocidadY;


      detectarCentro();


    }


    animate();


    /* =================================================
       INTEGRACIÓN AR / MR
    ================================================= */


    const scene =

      document.querySelector(

        "#scene"

      );


    const sky =

      document.querySelector(

        "#sky"

      );


    const modelo =

      document.querySelector(

        "#templo"

      );


    const arButton =

      document.querySelector(

        "#arButton"

      );


    const exitAR =

      document.querySelector(

        "#exitAR"

      );


    /* ============================
       ENTRAR EN AR
    ============================ */

    arButton.addEventListener(

      "click",

      async () => {


        try {


          if (

            !navigator.xr

          ) {


            alert(

              "Este dispositivo o navegador no soporta WebXR."

            );


            return;

          }


          const supported =

            await navigator.xr.isSessionSupported(

              "immersive-ar"

            );


          if (!supported) {


            alert(

              "El modo AR no está disponible en este dispositivo."

            );


            return;

          }


          const session =

            await navigator.xr.requestSession(

              "immersive-ar",

              {

                requiredFeatures: [],

                optionalFeatures: [

                  "local-floor",

                  "hit-test"

                ]

              }

            );


          scene.renderer.xr.setSession(

            session

          );


          sky.setAttribute(

            "visible",

            false

          );


          modelo.setAttribute(

            "position",

            "0 0 -3"

          );


          modelo.setAttribute(

            "scale",

            "0.3 0.3 0.3"

          );


          arButton.style.display =

            "none";


          exitAR.style.display =

            "block";


          console.log(

            "Modo AR iniciado"

          );


        }

        catch (error) {


          console.error(

            "Error al iniciar AR:",

            error

          );


          alert(

            "No se pudo iniciar el modo AR."

          );


        }


      }

    );


    /* ============================
       SALIR DE AR
    ============================ */

    exitAR.addEventListener(

      "click",

      async () => {


        const session =

          scene.renderer.xr.getSession();


        if (session) {


          await session.end();


        }


        sky.setAttribute(

          "visible",

          true

        );


        modelo.setAttribute(

          "position",

          "0 0 2"

        );


        modelo.setAttribute(

          "scale",

          "0.2 0.2 0.2"

        );


        arButton.style.display =

          "block";


        exitAR.style.display =

          "none";


        console.log(

          "Saliendo de AR"

        );


      }

    );


    /* ============================
       EVENTOS WEBXR
    ============================ */

    scene.addEventListener(

      "enter-vr",

      () => {


        console.log(

          "Se inició una sesión WebXR"

        );


      }

    );


    scene.addEventListener(

      "exit-vr",

      () => {


        console.log(

          "Sesión WebXR finalizada"

        );


        sky.setAttribute(

          "visible",

          true

        );


        arButton.style.display =

          "block";


        exitAR.style.display =

          "none";


      }

    );


  </script>


</body>

</html>
